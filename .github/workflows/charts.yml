name: Daily chart commit

on:
  schedule:
    # 평일 16:10 KST (07:10 UTC) — 장 마감 후 확정 봉으로 차트·시세 시드 커밋
    - cron: "10 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  charts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Fetch quote and history
        run: python3 scripts/fetch_quote.py docs/quote.json /tmp/history.json
      - name: Generate tech charts
        run: python3 scripts/tech_charts.py /tmp/history.json docs/charts
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/quote.json docs/charts
          git diff --cached --quiet || { git commit -m "차트·시세 일일 갱신 (자동)"; git push; }
